server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    # Proxy API requests — eliminates CORS entirely
    location /api/ {
        proxy_pass https://med-backend.purpleplant-48cb81e7.eastus.azurecontainerapps.io/;
        proxy_ssl_server_name on;
        proxy_set_header Host med-backend.purpleplant-48cb81e7.eastus.azurecontainerapps.io;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # SPA routing — all routes go to index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    gzip on;
    gzip_types text/plain text/css application/javascript;
}
